name: 每日A股强势股扫描 (北京时间17:00)

on:
  schedule:
    - cron: '0 9 * * *'      # UTC 9:00 = 北京时间 17:00
  workflow_dispatch:         # 允许手动点击运行（用于测试）

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy akshare baostock tqdm openpyxl

      - name: 运行强势股扫描器
        run: python stock_scanner_v79.py

      - name: 上传扫描结果（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-results
          path: results/
          retention-days: 7
